# Reachy Mini Voice Bot 配置文件
# 所有参数均可通过命令行覆盖，命令行优先级高于配置文件
# 未指定设备参数时，程序会通过 udev 自动探测 Reachy Mini 硬件

# ==============================================================================
# 音频设备
# ==============================================================================
audio:
  # 输入设备索引 (麦克风)，-1 表示自动探测
  input_device: -1
  # 输出设备索引 (扬声器)，-1 表示自动探测
  output_device: -1
  # 录音采样率 (Hz)，0 表示自动探测
  capture_rate: 0
  # 录音声道数，0 表示自动探测
  capture_channels: 0
  # 播放采样率 (Hz)，0 表示自动探测
  playback_rate: 0
  # 播放声道数，0 表示自动探测
  playback_channels: 0

# ==============================================================================
# LLM (大语言模型)
# ==============================================================================
llm:
  # LLM API 地址 (必填)
  url: "http://localhost:8080"
  # LLM 模型名称
  model: "qwen2.5:0.5b"
  # 最大生成 token 数
  max_tokens: 150

# ==============================================================================
# TTS (语音合成)
# ==============================================================================
tts:
  # TTS 后端引擎
  # 可选: matcha:zh / matcha:en / matcha:zh-en / kokoro / kokoro:<voice>
  engine: "matcha:zh-en"

# ==============================================================================
# VAD (语音活动检测)
# ==============================================================================
vad:
  # VAD 阈值 (0.0 - 1.0)，越高越严格
  threshold: 0.8
  # 静音持续时间 (秒)，超过此时间判定说话结束
  silence_duration: 0.5

# ==============================================================================
# 电机控制
# ==============================================================================
motor:
  # 电机串口路径
  port: "/dev/ttyACM0"

# ==============================================================================
# 摄像头
# ==============================================================================
camera:
  # 人脸/手势跟踪相机 ID，0 表示自动探测
  id: 0

# ==============================================================================
# MCP (Model Context Protocol)
# ==============================================================================
mcp:
  # MCP 配置文件路径 (留空使用内置默认)
  config_path: ""

# ==============================================================================
# 调试
# ==============================================================================
debug:
  # 是否保存录音
  save_audio: false
  # 录音保存路径
  audio_file: "voice_debug.wav"
